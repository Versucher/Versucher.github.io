<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal // System_Core</title>
    <style>
        /* Sci-Fi & Cyberpunk Design System */
        :root {
            --bg-color: #030712;
            --surface-color: #0b1329;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --text-primary: #f3f4f6;
            --text-dim: #6b7280;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Scanline Overlay for CRT Monitor Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Futuristic HUD Terminal Box */
        .terminal-box {
            background-color: var(--surface-color);
            width: 90%;
            max-width: 550px;
            padding: 2.5rem;
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1), inset 0 0 15px rgba(0, 243, 255, 0.05);
            animation: bootUp 0.6s cubic-bezier(0.15, 0.85, 0.3, 1) forwards;
        }

        /* Decorative Corner Brackets for Tech Aesthetic */
        .terminal-box::before, .terminal-box::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--neon-cyan);
        }
        .terminal-box::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .terminal-box::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        /* Top Bar Status Indicator */
        .status-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--neon-cyan);
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(0, 243, 255, 0.15);
            padding-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-online {
            animation: pulse 1.5s infinite;
        }

        /* Animated HUD Crosshair Avatar */
        .hud-avatar {
            width: 90px;
            height: 90px;
            margin: 0 auto 1.5rem;
            border: 2px dashed var(--neon-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            position: relative;
            animation: rotateHUD 20s linear infinite;
        }

        .hud-avatar::after {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border: 1px solid var(--neon-pink);
            border-radius: 50%;
            opacity: 0.4;
        }

        .hud-content {
            animation: fixRotation 20s linear infinite;
        }

        /* Typography */
        h1 {
            font-size: 1.6rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.6);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.85rem;
            text-align: center;
            color: var(--neon-cyan);
            margin-bottom: 2.5rem;
            opacity: 0.8;
        }

        /* Cyberpunk Action Buttons */
        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .cyber-btn {
            display: block;
            padding: 1rem;
            text-align: left;
            text-decoration: none;
            color: var(--text-primary);
            background: rgba(0, 243, 255, 0.02);
            border: 1px solid rgba(0, 243, 255, 0.2);
            position: relative;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .cyber-btn::before {
            content: '>';
            margin-right: 10px;
            color: var(--neon-pink);
            font-weight: bold;
        }

        /* Interactive Hover State Matrix Glow */
        .cyber-btn:hover {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-cyan);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            transform: translateX(4px);
        }

        /* Keyframes Animations */
        @keyframes bootUp {
            0% { transform: scaleY(0.01) scaleX(0); opacity: 0; }
            50% { transform: scaleY(0.01) scaleX(1); opacity: 1; }
            100% { transform: scaleY(1) scaleX(1); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes rotateHUD {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fixRotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }
    </style>
</head>
<body>

    <div class="terminal-box">
        <!-- Top Status Bar -->
        <div class="status-header">
            <span>System: Operations</span>
            <span class="status-online">● Node_Online</span>
        </div>

        <!-- Target HUD Avatar -->
        <div class="hud-avatar">
            <div class="hud-content">☠</div>
        </div>
        
        <!-- Identity Configurations -->
        <h1>Root_User</h1>
        <div class="subtitle">Console // Network Engineer & Dev</div>

        <!-- Navigation Matrix Portals -->
        <div class="button-grid">
            <a href="#" class="cyber-btn">Access_Database (Blog)</a>
            <a href="#" class="cyber-btn">Execute_Projects (Portfolio)</a>
            <a href="#" class="cyber-btn">Establish_Comms (Contact)</a>
        </div>
    </div>

</body>
</html>
