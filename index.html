<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        /* 定义现代全局颜色变量 (基于深色主题) */
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --accent: #38bdf8; 
        }

        /* 基础重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 页面主体布局 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            /* 添加细微的背景网格增加科技感 */
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 居中卡片容器 */
        .container {
            max-width: 500px;
            width: 90%;
            padding: 2.5rem 2rem;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            /* 页面加载时的淡入上浮动画 */
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* 顶层头像/图标 */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.4);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        p.bio {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        /* 链接按钮列表 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: block;
            padding: 1rem;
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* 鼠标悬浮时的交互反馈 */
        .link-btn:hover {
            background-color: var(--accent);
            color: #0f172a;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(56, 189, 248, 0.3);
            border-color: transparent;
        }

        /* 动画关键帧 */
        @keyframes fadeIn {
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar">👨‍💻</div>
        
        <h1>hello world</h1>
        <p class="bio">技术探索者 / 网络折腾玩家 / 终身学习者</p>

        <div class="links">
            <a href="#" class="link-btn">📚 浏览我的博客</a>
            <a href="#" class="link-btn">🛠️ 我的项目展示</a>
            <a href="#" class="link-btn">📧 与我联系</a>
        </div>
    </div>

</body>
</html>
